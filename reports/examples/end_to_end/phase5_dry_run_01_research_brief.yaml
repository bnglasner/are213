    source_file: "AI_READABLE/D3_Staggered_adoption.md"
    confidence: "high"
  - claim: "Pre-trend/event-study diagnostics are central to DiD credibility."
    source_file: "AI_READABLE/D2_Canonical_DiD.md"
    confidence: "high"
  - claim: "Extensions stress anticipation, spillovers, and design-specific failure modes."
    source_file: "AI_READABLE/D4_DiD_extensions.md"
