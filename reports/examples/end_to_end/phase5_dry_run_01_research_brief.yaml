research_question: "What is the causal effect of staggered policy adoption on firm employment?"
primary_estimand: "Average dynamic treatment effects relative to pre-adoption periods"
target_population: "Firms in adopting and comparison regions within the analysis window"
unit_of_observation: "Region-year firm employment panel observation"
treatment_definition: "Indicator for policy active status by region-year, with staggered first adoption dates"
outcome_definition: "Firm employment level or log employment at yearly frequency"
sample_construction: "Panel of observed firms/regions with treatment timing, outcomes, and baseline controls; includes never-treated and not-yet-treated units"
design_family_candidate: "Staggered DiD"
known_threats:
  - "Pre-trend differences across early and late adopters"
  - "Estimator bias from naive TWFE under heterogeneous treatment effects"
  - "Inference sensitivity to clustering/dependence structure"
code_and_data_scope:
  code_paths:
    - "reports/archive/development_dry_runs/phase4_dry_run_01_pseudocode.R"
  data_paths:
    - "Unavailable in dry run"
  documentation_paths:
    - "AI_READABLE/D2_Canonical_DiD.md"
    - "AI_READABLE/D3_Staggered_adoption.md"
    - "AI_READABLE/D4_DiD_extensions.md"
observed_evidence:
